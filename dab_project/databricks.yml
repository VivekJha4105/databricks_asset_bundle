# This is a Databricks asset bundle definition for dab_project.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: dab_project
  uuid: 8432868f-54f2-43c5-8c3e-a7bec41279d7

include:
  - resources/*.yml
  - resources/*/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use

  schema:
    description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    presets:
      source_linked_deployment: false
    workspace:
      host: https://dbc-3cea4536-361c.cloud.databricks.com/
    variables:
      catalog: asset_bundles
      schema: information_schema

  prod:
    mode: production
    workspace:
      host: https://dbc-3cea4536-361c.cloud.databricks.com/
      # We explicitly deploy to /Workspace/Users/vivek.ajay.p50@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/Users/vivek.ajay.p50@gmail.com/PROD/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: workspace
      schema: prod
    permissions:
      - user_name: vivek.ajay.p50@gmail.com
        level: CAN_MANAGE
